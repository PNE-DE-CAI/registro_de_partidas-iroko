        }

            gap: 12px;
            align-items: center;
            margin-bottom: 15px;
        }

        input, select, button {
            padding: 8px 14px;
            border-radius: 60px;
            border: none;
            background: #fef3e0;
            font-size: 0.9rem;
        }

            padding: 6px 20px;

        }

            margin-top: 20px;
        }

        .player-card {

        }

            font-weight: 800;
            color: #2c3e50;
            word-break: break-word;
        }

            font-size: 2.8rem;
            font-weight: 800;
            text-align: center;
            margin: 12px 0;
            background: #2c3e50;
            color: #f5f5dc;
            border-radius: 50px;
            padding: 8px;
            font-family: monospace;

            gap: 20px;
            margin-bottom: 15px;

            height: 55px;
            border-radius: 40px;
            border: none;
            font-weight: bold;
            background: #2c3e50;
            color: white;
        }

            font-weight: bold;

    function parseGamesFromText() {
        const lines = gamesRawText.split('\n');
        const gamesList = [];
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            // Extrair nome, total e data
            let nome = "";
            let totalPartidas = 0;
            let ultimaData = "";
            // Tentar separar por '='
            let eqIndex = line.indexOf('=');
            if (eqIndex === -1) continue;
            let nomePart = line.substring(0, eqIndex).trim();
            let resto = line.substring(eqIndex + 1).trim();
            // Remover possíveis prefixos tipo "001s:" ou "01:" do nome
            let nomeLimpo = nomePart.replace(/^\d+[s:]?\s*:?\s*/, '').trim();
            // Se ainda tiver ':' no nome (caso Carcassone:Maredosul), substituir por espaço
            nomeLimpo = nomeLimpo.replace(/:/g, ' ');
            nome = nomeLimpo;
            // Extrair total e data
            let totalMatch = resto.match(/(\d+)\s*x/);
            if (totalMatch) totalPartidas = parseInt(totalMatch[1]);
            // Extrair data: após o traço ou após o número
            let dataMatch = resto.match(/-\s*(.+)$/);
            if (dataMatch) {
                ultimaData = dataMatch[1].trim();
                // limpar possíveis espaços e barras
                ultimaData = ultimaData.replace(/^[\s\-]+/, '');
            } else {
                // tentar pegar data direto se tiver formato dd/mm/aa
                let dataRaw = resto.match(/(\d{1,2}\/\d{1,2}\/\d{2,4})/);
                if (dataRaw) ultimaData = dataRaw[1];
            }
            if (ultimaData === "") ultimaData = "data desconhecida";
            gamesList.push({ name: nome, totalPartidas, ultimaData });
        }
        return gamesList;
    }
